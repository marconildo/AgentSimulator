<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    AgentSimulator favicon — same mark as the header <Logo> in
    components/icons.tsx, sitting in the same rounded halo the App header
    wraps it in. Colors are literal (favicons can't read CSS vars or
    currentColor — they load outside the document tree).
  -->
  <defs>
    <linearGradient id="orbit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- halo (rounded panel-2 square, like the header's h-8 w-8 rounded-xl) -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#131b2e"/>

  <!--
    Header Logo lives in a 28×28 viewBox at 22×22 inside a 32×32 halo
    (5px inset). Scaled for this 64×64 favicon: inset=10, scale=44/28.
    Paths verbatim from icons.tsx::Logo.
  -->
  <g transform="translate(10,10) scale(1.5714)">
    <path d="M 4 14 A 10 10 0 1 1 14 24"
          fill="none" stroke="url(#orbit)" stroke-width="2" stroke-linecap="round"/>
    <path d="M 11 21 L 14 24 L 11 27"
          fill="none" stroke="#a78bfa" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="14" cy="4.5" r="1.5" fill="#7dd3fc"/>
    <circle cx="22.5" cy="18" r="1.4" fill="#c4b5fd"/>
    <circle cx="6" cy="20" r="1.2" fill="#7dd3fc" opacity="0.7"/>
    <circle cx="14" cy="14" r="3.2" fill="#7dd3fc"/>
  </g>
</svg>
