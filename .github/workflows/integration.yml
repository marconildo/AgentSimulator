name: E2E (Playwright, live stack)

# Manual only: brings up the full Docker stack (frontend + the real ingress chain
# + backend) and runs the Playwright browser suite against it — a real Chromium
# drives the React UI exactly like a user. It makes real OpenAI calls, so it is
# gated behind a manual trigger; run it before publishing to main.
#
# GitHub-hosted `ubuntu-latest` runners ship Docker + `docker compose`, so the
# same `docker compose up` you run locally works here unchanged.
on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    # OPENAI_API_KEY is an *environment* secret scoped to "DEV" (Settings → Secrets
    # → Actions → Environment secrets), so the job must opt into that environment or
    # the secret resolves empty and the backend boots with has_key=false.
    environment: DEV
    # The agent path needs a real key; the backend container fails fast without it.
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Check the OpenAI key reached the runner
        # Fail fast (and clearly) before building the stack if the secret is missing.
        # We test only for *presence* — the value stays masked.
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY is empty. Set it under Settings → Secrets and variables → Actions → the **Secrets** tab (not Variables), named exactly OPENAI_API_KEY."
            exit 1
          fi
          echo "OPENAI_API_KEY is present (${#OPENAI_API_KEY} chars)."

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bring up the full stack (frontend + chain + backend)
        run: docker compose up -d --build

      - name: Install Playwright + Chromium
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Wait for the stack to be ready
        # The frontend (:5173) serves immediately; the backend builds its vector
        # index on first boot, so poll the chain front door (:8090/api/health)
        # until it reports a healthy backend with a key, then confirm the UI is up.
        run: |
          echo "Waiting for the ingress chain + backend (:8090)…"
          for i in $(seq 1 60); do
            body=$(curl -fsS http://localhost:8090/api/health 2>/dev/null || true)
            echo "$body" | grep -q '"status":"ok"' && echo "$body" | grep -q '"has_key":true' && {
              echo "Backend healthy: $body"; break; }
            sleep 5
            if [ "$i" -eq 60 ]; then echo "::error::backend never became healthy"; exit 1; fi
          done
          echo "Waiting for the frontend (:5173)…"
          for i in $(seq 1 30); do
            curl -fsS http://localhost:5173 >/dev/null 2>&1 && { echo "Frontend up."; break; }
            sleep 2
            if [ "$i" -eq 30 ]; then echo "::error::frontend never served"; exit 1; fi
          done

      - name: Run Playwright E2E
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
        run: npm run test:e2e

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Stack logs (on failure)
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Tear down
        if: always()
        run: docker compose down -v
