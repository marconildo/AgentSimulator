name: Integration (live stack)

# Manual only: this brings up the full Docker stack (the real ingress chain +
# backend) and runs the black-box end-to-end agent suite against it. It makes
# real OpenAI calls, so it is gated behind a manual trigger — run it before
# publishing to main as the release regression net.
#
# GitHub-hosted `ubuntu-latest` runners ship Docker + `docker compose`, so the
# same `docker compose up` you run locally works here unchanged.
on:
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    # The agent path needs a real key; the backend container fails fast without it.
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The integration tests are black-box (pure HTTP) — they import no app
      # code, so the runner only needs an HTTP client and pytest.
      - name: Install test client
        run: pip install "httpx>=0.27.0" pytest

      - name: Bring up the ingress chain + backend
        run: docker compose up -d --build backend coredns varnish haproxy modsecurity kong

      - name: Run integration suite
        # The suite's `live_stack` fixture polls the chain front door (:8090) until
        # it is healthy (up to 3 min) before any test runs, then fails loudly if
        # the stack never came up — a green run means the real stack answered.
        working-directory: backend
        env:
          CHAIN_BASE_URL: http://localhost:8090
        run: pytest tests/integration -m integration

      - name: Stack logs (on failure)
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Tear down
        if: always()
        run: docker compose down -v
