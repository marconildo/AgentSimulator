# 058-online-demo-mode — build the backend-less showcase and publish it to
# GitHub Pages. The demo replays REAL captured traces (frontend/src/demo/fixtures,
# constitution §3) and talks to no backend, so it scales to any number of
# concurrent visitors (it's a static CDN). The full, key-required live tool stays
# the GitHub-local route (docker compose up).
name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; cancel an in-flight one on a new push.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Flip the frontend into the mocked, backend-less showcase build.
      VITE_DEMO_MODE: "1"
      # GitHub Pages project site lives under /<repo>/.
      BASE_PATH: "/AgentSimulator/"
    steps:
      - uses: actions/checkout@v4
      # Enables GitHub Pages for the repo if it isn't already (avoids the
      # "Ensure GitHub Pages has been enabled" 404 on the deploy step).
      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      # SPA fallback: GitHub Pages serves 404.html for unknown paths; pointing it
      # at the app means a deep link / refresh still loads the single-page app.
      - run: cp dist/index.html dist/404.html
      # Jekyll would strip files; disable it for a plain static upload.
      - run: touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
