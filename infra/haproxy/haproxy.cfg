# 088-network-layer — HAProxy as the TLS / load-balancer hop.
#
# 090-waf-after-lb: HAProxy is the single TLS-termination point. It decrypts the
# request and load-balances onto its upstream — the WAF (ModSecurity) — which can
# only inspect plaintext, so it must sit *after* this hop. HAProxy stamps the
# LB + DNS forwarded evidence the backend reads back in app/network.py. It does NOT
# stamp the WAF-cleared header: the WAF is now downstream, so HAProxy can't attest a
# pass — Kong (the first hop past the WAF) does that instead (see infra/kong/kong.yml).
#
# §7 honesty: this is a one-node pool (a single backend), demonstrating TLS
# termination + load-balancing to one upstream, not a horizontally scaled fleet.

global
    log stdout format raw local0
    maxconn 2048

defaults
    mode http
    log global
    option httplog
    timeout connect 5s
    # Long timeouts so the streamed SSE response isn't cut off.
    timeout client 1h
    timeout server 1h
    option http-server-close

frontend ingress
    bind *:8081
    # Evidence headers the backend reads (app/network.py):
    #  - TLS/LB: the upstream chosen + the (terminated) TLS version + this LB.
    http-request set-header X-Lb-Upstream "modsecurity:8080"
    http-request set-header X-Lb-Server "haproxy"
    http-request set-header X-Lb-Tls-Version "TLSv1.3"
    http-request set-header X-Forwarded-Proto "https"
    #  - DNS: the upstream service name CoreDNS resolved for the next hop.
    http-request set-header X-Dns-Host "modsecurity"
    # NB: no X-Waf-Status here — the WAF is downstream now; Kong attests the pass.
    default_backend app_waf

backend app_waf
    # A single upstream (one-node pool) — the WAF (ModSecurity).
    server modsecurity modsecurity:8080 check
