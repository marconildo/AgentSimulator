# 088-network-layer — HAProxy as the TLS / load-balancer hop.
#
# It terminates the request, load-balances onto the (single) backend upstream — the
# API gateway (Kong) — and stamps the forwarded evidence the backend reads back in
# app/network.py. It also stamps the WAF-cleared + DNS evidence here, honestly:
# anything reaching HAProxy provably got past the WAF (ModSecurity blocks attacks
# upstream), and the upstream service name is what CoreDNS resolved.
#
# §7 honesty: this is a one-node pool (a single backend), demonstrating TLS
# termination + load-balancing to one upstream, not a horizontally scaled fleet.

global
    log stdout format raw local0
    maxconn 2048

defaults
    mode http
    log global
    option httplog
    timeout connect 5s
    # Long timeouts so the streamed SSE response isn't cut off.
    timeout client 1h
    timeout server 1h
    option http-server-close

frontend ingress
    bind *:8081
    # Evidence headers the backend reads (app/network.py):
    #  - TLS/LB: the upstream chosen + the (terminated) TLS version + this LB.
    http-request set-header X-Lb-Upstream "kong:8000"
    http-request set-header X-Lb-Server "haproxy"
    http-request set-header X-Lb-Tls-Version "TLSv1.3"
    http-request set-header X-Forwarded-Proto "https"
    #  - WAF: anything here cleared ModSecurity (it 403s attacks upstream).
    http-request set-header X-Waf-Status "clean"
    http-request set-header X-Waf-Engine "modsecurity"
    #  - DNS: the upstream service name CoreDNS resolved for the next hop.
    http-request set-header X-Dns-Host "kong"
    default_backend app_gateway

backend app_gateway
    # A single upstream (one-node pool) — the API gateway.
    server kong kong:8000 check
