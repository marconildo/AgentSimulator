# AgentSimulator — WAF rule exclusion scoped to the settings endpoints.
#
# Why: /api/settings/* legitimately carries OPAQUE SECRET BLOBS — the Google
# service-account JSON (with a PEM private key), the OpenAI API key, the Ollama
# URL. The OWASP CRS false-positives on these. Concretely, ModSecurity flattens
# the JSON body into args, so the field name "credentials" becomes the arg
# "json.credentials", which matches the LFI sensitive-file list (".credentials",
# as in ~/.aws/credentials) in rule 930120. That single CRITICAL match (score 5)
# already meets the inbound anomaly threshold (5) and the request is blocked with
# a 403 — before it ever reaches the backend. PUT /api/settings/vertexai (saving
# the service account) is the visible victim; the same would hit other secret
# settings saves.
#
# Fix: a NARROW exclusion, scoped by path to /api/settings/ only — the rest of
# the API keeps full CRS coverage. We drop just the LFI rule family (930xxx),
# which is the category that pattern-matches credential field names / file-like
# paths inside an opaque key. A phase:1 rule that runs before the phase:2 CRS
# rules removes them for this transaction only.
#
# This file is included via owasp-crs/plugins/*-after.conf (see setup.conf load
# order). Mounted into the modsecurity service in docker-compose.yml.
SecRule REQUEST_URI "@beginsWith /api/settings/" \
    "id:1000100,\
    phase:1,\
    t:none,\
    nolog,\
    pass,\
    msg:'AgentSimulator: relax LFI rules for opaque-secret settings endpoints',\
    ctl:ruleRemoveById=930100,\
    ctl:ruleRemoveById=930110,\
    ctl:ruleRemoveById=930120,\
    ctl:ruleRemoveById=930130"
