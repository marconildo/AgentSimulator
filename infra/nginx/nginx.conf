# 084-network-edge — the REAL network edge in front of the backend API.
#
# This is the reverse proxy / load balancer / TLS-termination tier the canvas's
# "Network Edge" box represents. The request genuinely traverses nginx before it
# reaches FastAPI; nginx injects the standard forwarded headers that the backend
# reads back in `app/edge.py` and reports honestly as the `edge` trace event.
#
# It is SSE-safe (`proxy_buffering off`) so the live trace stream flows through
# unbuffered, token by token, exactly as it does without the proxy.

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # Use the client's X-Request-Id when present, otherwise mint one per request
    # so every request is traceable end-to-end through the edge.
    map $http_x_request_id $edge_request_id {
        ""      $request_id;
        default $http_x_request_id;
    }

    # A single upstream today (the app is single-instance by design, §7); add
    # more `server` lines here to genuinely load-balance across replicas.
    upstream backend_api {
        server backend:8000;
    }

    server {
        listen 8080;
        server_name _;

        # TLS termination would live here in production:
        #   listen 8443 ssl;
        #   ssl_certificate     /etc/nginx/certs/edge.crt;
        #   ssl_certificate_key /etc/nginx/certs/edge.key;
        # With a cert mounted, X-Forwarded-Proto becomes https and the backend
        # reports tls=true — no app change needed.

        location / {
            proxy_pass http://backend_api;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # The forwarded headers — the evidence app/edge.py reports as `edge`.
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Request-Id      $edge_request_id;
            # The edge announces itself so the backend reports an honest proxy
            # identity (only ever what the header literally says).
            proxy_set_header X-Edge-Proxy      "nginx";

            # SSE: stream the trace + answer through unbuffered.
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1h;
        }
    }
}
