# One command to run the whole simulator:  docker compose up --build
#
# - backend  -> FastAPI + LangGraph agent on http://localhost:8000
# - frontend -> static React build served by nginx on http://localhost:5173
#
# By default it runs in DEMO_MODE (no API key). To use real OpenAI, create
# backend/.env with OPENAI_API_KEY and set DEMO_MODE=false.

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # Runs out of the box with no keys. For real OpenAI, start with:
      #   DEMO_MODE=false OPENAI_API_KEY=sk-... docker compose up
      # (or put those in a .env file next to this docker-compose.yml).
      DEMO_MODE: ${DEMO_MODE:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      # Persist the vector store between runs.
      - chroma-data:/app/app/data/chroma

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  chroma-data:
